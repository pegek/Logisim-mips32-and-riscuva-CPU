    <text x="448" y="86">instrukcja</text>
    <text x="640" y="175" text-anchor="end">mówi co robić</text>
    <text x="452" y="245">dane</text>
    <text x="360" y="330" text-anchor="start">zapis / odczyt</text>
    <text x="150" y="146" text-anchor="start">↩ PC przesuwa się dalej</text>
  </g>
