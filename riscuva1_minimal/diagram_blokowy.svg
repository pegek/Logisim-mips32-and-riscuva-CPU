    <text x="400" y="420">tu leżą i sortują się liczby (0,1,2,3)</text>
  </g>
  <g fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#a)">
    <path d="M170,93 L246,93"/>
    <path d="M410,93 L486,93"/>
    <path d="M580,126 L580,216"/>
    <path d="M490,253 L414,253"/>
    <path d="M330,286 L330,366"/>
    <path d="M100,126 L100,410 L246,410"/>
